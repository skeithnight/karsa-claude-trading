services:
  # 1. API GATEWAY
  karsa-9router:
    image: decolua/9router:latest
    container_name: karsa-9router
    ports:
      - "20128:20128"
    volumes:
      - ./9router-config.yaml:/app/config.yaml
      - 9router-data:/app/data
    networks: [trading-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:20128/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 2. DATABASE & STATE
  redis:
    image: redis:7-alpine
    container_name: karsa-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks: [trading-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: karsa-postgres
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [trading-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 3. DATA LAYER
  tradingview-mcp:
    image: python:3.11-slim
    container_name: karsa-tradingview-mcp
    command: >
      sh -c "pip install tradingview-mcp-server && tradingview-mcp --port 8080"
    environment:
      - TRADINGVIEW_MARKET=stocks,etf,forex
      - IDX_SUFFIX=.JK
      - US_MARKETS=NYSE,NASDAQ
    ports:
      - "8080:8080"
    networks: [trading-net]
    restart: unless-stopped

  # 4. ORCHESTRATION & AGENTS
  karsa-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: karsa-orchestrator
    env_file: [.env]
    environment:
      - ANTHROPIC_BASE_URL=http://karsa-9router:20128/v1
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://trader:${DB_PASSWORD:-changeme}@postgres:5432/trading
      - TRADINGVIEW_MCP_URL=http://tradingview-mcp:8080
    depends_on:
      karsa-9router:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [trading-net]
    command: ["python", "-m", "src.main"]
    restart: unless-stopped

  # 5. TELEGRAM BOT
  karsa-telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: karsa-telegram-bot
    env_file: [.env]
    ports:
      - "8443:8443"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [trading-net]
    command: ["python", "-m", "src.bot.main"]
    restart: unless-stopped

networks:
  trading-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  9router-data:
