server:
  port: 20128

combos:
  # Lead Orchestrator + Risk Manager — maximum reasoning quality
  - name: "karsa-critical"
    models:
      - provider: anthropic
        model: claude-sonnet-4-6
        tier: subscription
      - provider: anthropic
        model: claude-haiku-4-5-20251001
        tier: subscription
    fallback_on: [rate_limit, error]
    timeout_ms: 60000

  # Technical/Data Analysts — high volume, lower reasoning need
  - name: "karsa-routine"
    models:
      - provider: anthropic
        model: claude-haiku-4-5-20251001
        tier: subscription
    fallback_on: [rate_limit, error]
    timeout_ms: 30000

  # Emergency kill-switch / macro risk-off — lowest latency, no fallback
  - name: "karsa-emergency"
    models:
      - provider: anthropic
        model: claude-haiku-4-5-20251001
        tier: subscription
    fallback_on: []
    timeout_ms: 8000
    max_retries: 1

# Cost guardrails — tiered circuit breaker
cost:
  monthly_ceiling_usd: 300
  daily_limit_usd: 15
  circuit_breaker:
    enabled: true
    tiers:
      - threshold_pct: 70
        action: alert
      - threshold_pct: 85
        action: block_routine
      - threshold_pct: 100
        action: block_all
