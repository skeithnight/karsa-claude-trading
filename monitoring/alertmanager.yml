global:
  resolve_timeout: 5m

route:
  receiver: 'karsa-telegram'
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: 'karsa-telegram-critical'
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'karsa-telegram'
      repeat_interval: 30m

receivers:
  - name: 'karsa-telegram'
    webhook_configs:
      - url: 'http://karsa-crypto-bot:8000/alert'
        send_resolved: true

  - name: 'karsa-telegram-critical'
    webhook_configs:
      - url: 'http://karsa-crypto-bot:8000/alert'
        send_resolved: true
