services:
  # 1. ROUTING
  9router:
    image: 9router:latest
    container_name: karsa-9router
    ports:
      - "127.0.0.1:20129:20128"
    volumes:
      - 9router-data:/app/data
    networks: [trading-net]
    restart: unless-stopped

  # 2. DATABASE & STATE
  redis:
    image: redis:7-alpine
    container_name: karsa-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks: [trading-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: karsa-postgres
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [trading-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 3. ORCHESTRATION & AGENTS
  karsa-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: karsa-orchestrator
    env_file: [.env]
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://trader:${DB_PASSWORD}@postgres:5432/trading
      - TRADINGVIEW_MCP_URL=direct
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [trading-net]
    command: ["python", "-m", "src.main"]
    restart: unless-stopped

  # 5. TELEGRAM BOT
  karsa-telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: karsa-telegram-bot
    env_file: [.env]
    ports:
      - "127.0.0.1:8443:8443"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks: [trading-net]
    command: ["python", "-m", "src.bot.main"]
    restart: unless-stopped

networks:
  trading-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  9router-data:
